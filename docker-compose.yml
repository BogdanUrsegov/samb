services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1  # 👈 Отключает буферизацию логов
      - PYTHONPATH=/app     # 👈 Явно указываем путь
    ports:
      - "8008:8008"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: python -m bot.main
    user: "root"